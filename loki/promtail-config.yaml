server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: app-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: app-logs
          service: zetheta-resync
          __path__: /var/log/app/app.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            job_id: job_id
            run_type: run_type
            user_id: user_id
      - labels:
          level:
          job_id:
          run_type:
          user_id:
